<h1 class="kindle-cn-heading-1" id="sigil_toc_id_18">七言绝句</h1>
<h2 class="kindle-cn-heading2" id="sigil_toc_id_19">贺知章</h2>
<p class="kindle-cn-kai">贺知章（659—744），字季真，越州永兴（今浙江萧山）人。少以文词著名，与张旭、包融、张若虚号称“吴中四士”。武则天证圣元年（695），登进士第，授国子四门博士。后历太常少卿、礼部侍郎、工部侍郎、太子宾客，授秘书监，故世称“贺监”。天宝初，求还为道士，敕赐镜湖以居。为人放达，晚年尤甚，自号“四明狂客”。好饮酒，与李白、张旭等合称“饮中八仙”。亦工书法，善为草、隶。两《唐书》有传。诗作以七绝为妙。</p>
