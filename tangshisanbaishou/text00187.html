<h2 class="kindle-cn-heading2">韩翃</h2>
<p class="kindle-cn-kai">韩翃，生卒年不详，字君平，南阳（今属河南）人。天宝十三载（754）进士。宝应元年（762），淄青节度使侯希逸署为幕中从事、检校金部员外郎。后归京闲居十年。又入汴宋节度使幕任职。建中元年（780），德宗以其有诗名，擢为驾部郎中、知制诰，官终中书舍人。韩翃为“大历十才子”之一，存诗较多，大都是送行赠别、流连光景之作。高仲武评其诗曰：“韩员外诗，匠意近于史，兴致繁富，一篇一咏，朝士珍之，多士之选也。”（《中兴间气集》）徐献忠曰：“君平意气清华，才情俱秀，故发调警拔，节奏琅然，每一篇出，辄相传布，亦雅道之中兴也。”（《唐诗品》）有《韩君平集》行世。</p>
