<h2 class="kindle-cn-heading2">常建</h2>
<p class="kindle-cn-kai">常建，生卒、里籍、字号均不详。开元十五年（727）进士。曾官盱眙（今属江苏）尉。后隐居鄂渚西山（今湖北鄂城西）。与王昌龄有交往。常建诗颇为时人推重，殷璠编《河岳英灵集》首列其诗，并称赞：“其旨远，其兴僻，佳句辄来，唯论意表。”常建诗多写田园风光、山林逸趣，意境恬淡清迥，语言洗练自然，风格质朴清新，为盛唐山水田园诗派的重要作家。今存诗五十余首，有《常建集》。</p>
