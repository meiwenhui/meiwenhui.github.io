<h2 class="kindle-cn-heading2">陈陶</h2>
<p class="kindle-cn-kai">陈陶（803？—879？），字嵩伯，晚年自称“三教布衣”，江北人。文宗大（太）和初，游于江南、岭南一带，曾作诗投献南方各节度使。大中三年（849），隐居洪州（今江西南昌）西山，卖柑为资。卒，方幹、曹松、杜荀鹤等皆作诗哭之。南唐亦有诗人曰陈陶，后人常误为一人。陈陶工乐府，《全唐诗》收诗二卷。有《陈嵩伯诗集》行世，其中混有南唐陈陶诗，有待甄别。</p>
