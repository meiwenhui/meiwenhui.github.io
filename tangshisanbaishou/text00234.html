<h1 class="kindle-cn-heading-1" id="sigil_toc_id_12">七言律诗</h1>
<h2 class="kindle-cn-heading2" id="sigil_toc_id_13">崔颢</h2>
<p class="kindle-cn-kai">崔颢（704？—754），汴州（今河南开封）人。开元十一年（723）进士。开元后期，曾以监察御史任职河东军幕。天宝初，任太仆寺丞，迁司勋员外郎，世称“崔司勋”。十三载（754）卒。两《唐书》有传。崔颢为盛唐著名诗人，殷璠曰：“颢少年为诗，属意浮艳，多陷轻薄。晚节忽变常体，风骨凛然，一窥塞垣，说尽戎旅……可与鲍照、江淹并驱也。”（《河岳英灵集》）存诗四十余首，有《崔颢诗集》。</p>
