<h2 class="kindle-cn-heading2">皇甫冉</h2>
<p class="kindle-cn-kai">皇甫冉（717？—770？），字茂政，郡望安定（今甘肃泾川），丹阳（今属江苏）人。十岁能属文，张九龄叹异之。天宝十五载（756）进士，授无锡尉。后任左金吾卫兵曹参军。大历初，入王缙河南幕，为节度掌书记。二年，迁左拾遗，转右补阙。奉使江表，因省家至丹阳，约卒于大历四、五年（769、770）间，享年五十四。皇甫冉工诗，与弟曾并称，人称“二皇甫”。诗风清俊，然边幅较狭。高仲武曰：“冉诗巧于文字，发调新奇，远出情外。”（《中兴间气集》卷上）现存诗二百三十余首，《全唐诗》编为二卷。</p>
