<h3 class="kindle-cn-heading3">寻隐者不遇</h3>
<p>松下问童子<span class="math-super">
<a id="noteBack_1" href="text00347.html#note_1">[1]</a>
</span>
 ，言师采药去。只在此山中，云深不知处<span class="math-super">
<a id="noteBack_2" href="text00347.html#note_2">[2]</a>
</span>
 。</p>
<p class="kindle-cn-para-no-indent">
<span class="kindle-cn-bold">【题解】</span>
</p>
<p class="kindle-cn-kai">此诗最早见于《文苑英华》卷二百二十八，诗题作《访羊尊师》，作者署孙革。元杨士弘《唐音》卷十五同。四部丛刊本《长江集》不载。宜定为孙革诗。</p>
<p class="kindle-cn-para-no-indent">
<span class="kindle-cn-bold">【评析】</span>
</p>
<p class="kindle-cn-kai">此诗寓问于答，词简意深，白描无华，一片天机自然。吴瑞荣曰：“此首似盛唐音调，极浅近，极幽微。孩提时烂熟口头，垂老或不能窥其门径，真妙制也。唐人访隐者不遇诗，总以此为上。”（《唐诗笺要》）。</p>
<p class="kindle-cn-para-no-indent">
<span class="kindle-cn-bold">【注释】</span>
</p>
<p class="kindle-cn-kai">
<a id="note_1" href="text00347.html#noteBack_1">[1]</a>
 松：《文苑英华》作“花”。</p>
<p class="kindle-cn-kai">
<a id="note_2" href="text00347.html#noteBack_2">[2]</a>
 处：此指行踪。</p>
