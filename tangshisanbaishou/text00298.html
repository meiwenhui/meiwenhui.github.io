<h2 class="kindle-cn-heading2">薛逢</h2>
<p class="kindle-cn-kai">薛逢（806—？），字陶臣，蒲州河东（今山西永济西）人。会昌元年（841）进士，授秘书省校书郎。崔铉镇河中，辟为幕府从事。大中三年（849），崔铉拜相，擢万年尉，历侍御史、尚书郎分司东都。以持论鲠切，出为巴州刺史。咸通初，历蓬、绵二州刺史。后以太常少卿召还，历给事中，官终秘书监。两《唐书》有传。薛逢工诗，尤工七律。胡震亨曰：“薛陶臣殊有写才，不虚俊拔之目。长歌似学白氏，虽以此得名，未如七律多警。”（《唐音癸签》卷八）《全唐诗》录存其诗约九十首，编为一卷。</p>
