<h2 class="kindle-cn-heading2">韩偓</h2>
<p class="kindle-cn-kai">韩偓（842—923，或谓844—941），字致尧（一作致光），小字冬郎，自号“玉山樵人”，京兆万年（今陕西西安）人。龙纪元年（889）进士。历任左拾遗、刑部员外郎、翰林学士、中书舍人、兵部侍郎等职，昭宗倚重之，欲拜相，固辞不受。后因忤朱温，两遭贬谪。后曾诏复为翰林学士，惧不赴任，入闽依王审知，卒。《新唐书》有传。偓十岁能诗，李商隐赞为“雏凤清于老凤声”（《韩冬郎即席为诗相送一座尽惊》）。诗多感时伤乱之作，颇具风骨。而其《香奁集》，则轻薄香艳，开“香奁体”诗风。《全唐诗》收诗四卷，有《玉山樵人集》行世。</p>
