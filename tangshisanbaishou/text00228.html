<h2 class="kindle-cn-heading2">杜荀鹤</h2>
<p class="kindle-cn-kai">杜荀鹤（846—904），字彦之，自号九华山人，行十五，池州石埭（今安徽石台）人。未仕前，曾隐居九华山、庐山多年，足迹遍及浙、闽、赣、湘等地。大顺二年（891），中进士。后为宣州节度使从事。天祐元年（904），朱温表荐为主客员外郎、知制诰，充翰林学士，因疾旬日而卒。两《唐书》无传，传见《旧五代史》与《十国春秋》。杜荀鹤继承杜甫、白居易等人的现实主义诗歌传统，自称“诗旨未能忘救物”（《自叙》），“言论关时务，篇章见《国风》”（《秋日山中》）。其诗能反映社会现实，关心民生疾苦。他专攻近体，无一篇古体。语言浅近通俗，明白晓畅，但亦被人讥为“鄙俚近俗”。存诗三百余首，有《杜荀鹤文集》传世。</p>
