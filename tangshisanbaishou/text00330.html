<h2 class="kindle-cn-heading2">李端</h2>
<p class="kindle-cn-kai">李端（？—785？），字正己，行二，赵州（今河北赵县）人。大历五年（770）进士，曾官秘书省校书郎、杭州司马，为“大历十才子”之一。《旧唐书•卢简辞传》称：“李端、钱起、韩翃辈能为五言诗，而辞情捷丽。”《全唐诗》存诗三卷。</p>
