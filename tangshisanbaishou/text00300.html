<h2 class="kindle-cn-heading2">秦韬玉</h2>
<p class="kindle-cn-kai">秦韬玉，生卒年不详，字中明，京兆（今陕西西安）人，或云郃阳（今陕西合阳东南）人，或据其诗谓故里在湖南。父为左军军将，因得出入大宦官田令孜之门，为交结宦官的“芳林十哲”之一。黄巢攻陷长安后，随僖宗入蜀。中和二年（882），特敕赐进士及第。官至工部侍郎、判度支。尝为田令孜神策军判官。“韬玉少有词藻，工歌吟，恬和浏亮”，“每作，人必传诵”（《唐才子传》卷九）。存诗三十余首，都为七言，明人辑有《秦韬玉诗集》。</p>
