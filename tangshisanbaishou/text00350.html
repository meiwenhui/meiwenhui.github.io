<h2 class="kindle-cn-heading2">金昌绪</h2>
<p class="kindle-cn-kai">金昌绪，生卒未详，约大中（847—859）以前在世，余杭（今属浙江）人。余事无考。存诗只《春怨》一首，却历代传诵。</p>
