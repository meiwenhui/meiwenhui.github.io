<h2 class="kindle-cn-heading2">朱庆馀</h2>
<p class="kindle-cn-kai">朱庆馀，生卒不详，名可久，以字行，排行大，越州（今浙江绍兴）人。宝历二年（826）进士，授秘书省校书郎。早岁曾得已享盛名的张籍奖掖，诗名广传，与当世著名诗人贾岛、姚合等皆有唱和。事迹录于《新唐书•艺文志》。诗擅五律、七绝，多送别纪游、酬答题咏之作。《全唐诗》收诗二卷。</p>
