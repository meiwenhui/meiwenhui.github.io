<h2 class="kindle-cn-heading2">权德舆</h2>
<p class="kindle-cn-kai">权德舆（761—818），字载之，排行三，天水略阳（今甘肃秦安东北）人，徙居润州丹阳（今属江苏）。四岁能诗，十五岁有《童蒙集》十卷。曾任大理评事摄监察御史充江西观察使李兼判官，德宗闻其名而征为太常博士，转左补阙。后历任中书舍人、礼部侍郎、户部侍郎、兵部侍郎、吏部侍郎，元和五年（810）拜相。后罢出，转历礼部、刑部尚书、山南东道节度使。贞元、元和间掌文柄，刘禹锡、柳宗元皆投文门下。性忠恕蕴藉，好学不倦。为文雅正，为诗赡缛浑厚，“工古调乐府，极多情致”（《唐才子传》卷五）。严羽《沧浪诗话》谓其诗“有绝似盛唐者”。两《唐书》有传。有《权载之文集》行世。</p>
