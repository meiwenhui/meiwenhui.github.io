<h2 class="kindle-cn-heading2">郑畋</h2>
<p class="kindle-cn-kai">郑畋（825—883，或824—882，或谓886卒），字台文，行大，荥阳（今属河南）人。会昌二年（842）进士。曾为中书舍人、梧州刺史。僖宗时入相，旋以议黄巢事罢相。中和元年（881）再度拜相，二年再罢为太子太保，卒谥文昭。郑畋长于诗文，尤善制诰，为同僚推重。两《唐书》有传。存诗十七首。</p>
