<h2 class="kindle-cn-heading2">张泌</h2>
<p class="kindle-cn-kai">张泌，生卒年未详，字子澄，淮南（今安徽寿县）人。仕于南唐，后主时为句容县尉，以上书后主言国事激切，征为监察御史，历考功员外郎、内史舍人。马令《南唐书》、《十国春秋》有传。擅长诗词，多为七言近体，诗风婉丽。《全唐诗》编其诗为一卷。</p>
