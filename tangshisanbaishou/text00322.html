<h2 class="kindle-cn-heading2">王之涣</h2>
<p class="kindle-cn-kai">王之涣（688—742），字季凌，郡望晋阳（今山西太原），五世祖时，以官迁居绛州（今山西新绛）。初以门荫得补衡水主簿，被诬去官，优游山水。至晚年，复补莫州文安（今属河北）尉，为官以清正著名。为人倜傥，曾游边塞，善写边塞诗，广为流传。王之涣为著名边塞诗人，薛用弱《集异记》卷二载其与王昌龄、高适“旗亭画壁”故事，可见名噪当时。《全唐诗》仅存诗六首。</p>
