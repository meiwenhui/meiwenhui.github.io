<h2 class="kindle-cn-heading2">王湾</h2>
<p class="kindle-cn-kai">王湾，生卒年不详，洛阳（今属河南）人。玄宗先天元年（712）进士。开元初，为荥阳（今属河南）主簿。五年（717）至九年，参与编撰《群书四部录》集部书目，书成，任洛阳尉。十七年，曾任朝官，此后行迹莫考。王湾词翰早著，为天下所称。往来吴、楚间，多有著述。现存诗十首，以《次北固山下》最著名。谭宗评其诗曰：“湾诗精思俊气，如极秀迈人，虽布袄芒靴，必剪制不同，迥出尘外。”（《近体秋阳》卷一）</p>
