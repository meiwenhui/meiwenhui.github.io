<h2 class="kindle-cn-heading2">张旭</h2>
<p class="kindle-cn-kai">张旭（675？—750？），字伯高，排行九，苏州吴（今江苏苏州）人。曾为常熟尉、金吾长史，世称“张长史”。嗜酒，为“饮中八仙”之一。善狂草，行为狂诞，人呼为“张颠”。文宗时，诏以李白歌诗、裴旻剑舞、张旭草书为“三绝”，世尊为“草圣”。又以诗文知名，与贺知章、包融、张若虚合称“吴中四士”。《新唐书》有传。其诗“清逸可爱”（杨慎《升庵诗话》卷十）。存诗十首。</p>
