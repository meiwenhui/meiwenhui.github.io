<h2 class="kindle-cn-heading2">马戴</h2>
<p class="kindle-cn-kai">马戴，生卒年不详，字虞臣，海州东海（今江苏连云港市）人。会昌四年（844），登进士第。大中初，任河东（太原）节度使幕掌书记，以正直被斥，贬朗州龙阳（今湖南汉寿）尉。官终国子博士。马戴一生游踪甚广，北至幽燕，南涉潇湘，东游江浙，西临陇蜀。生平与贾岛、姚合、顾非熊、殷尧藩等相友善，酬唱赠答，颇有诗名。薛能《送马戴书记之太原》谓其“诗雅负雄名”。严羽称“马戴在晚唐诸人之上”（《沧浪诗话•诗评》）。纪昀认为：“晚唐诗人，马戴骨格最高。”（《瀛奎律髓刊误》卷二十九）有《会昌进士诗集》一卷、《补遗》一卷。</p>
