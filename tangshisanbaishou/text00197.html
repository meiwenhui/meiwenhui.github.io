<h2 class="kindle-cn-heading2">司空曙</h2>
<p class="kindle-cn-kai">司空曙（720？—794？），字文明，一作文初，行十四，广平（今河北永年东）人，或谓京兆（今陕西西安）人。登进士第，不详何年。曾官主簿。大历五年（770），任左拾遗，贬长林（今湖北荆门西北）丞。贞元间，在剑南西川节度使韦皋幕任职，官检校水部郎中，终虞部郎中。司空曙为卢纶表兄，亦是“大历十才子”之一。其诗多为行旅赠别之作，长于抒情，多有名句。胡震亨曰：“司空虞部婉雅闲淡，语近性情。”（《唐音癸签》卷七）现存诗一百七十余首，有《司空文明诗集》。</p>
