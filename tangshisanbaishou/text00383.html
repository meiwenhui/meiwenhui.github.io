<h2 class="kindle-cn-heading2">张继</h2>
<p class="kindle-cn-kai">张继（？—779？），字懿孙，行二十，襄州（今湖北襄樊）人，郡望南阳（今属河南）。天宝十二载（753）进士。安史之乱时避居江南。大历年间，曾任侍御、检校祠部员外郎兼转运使判官，故世称“张祠部”、“张员外”。为人自矜气节，素怀大志。工诗文，诗风清迥，所作流传不多。《全唐诗》编为一卷，混入他人之作不少。</p>
