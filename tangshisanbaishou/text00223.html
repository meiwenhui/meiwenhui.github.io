<h2 class="kindle-cn-heading2">张乔</h2>
<p class="kindle-cn-kai">张乔，生卒年不详，字伯迁，池州青阳（今属安徽）人。尝隐居九华山，与许棠、张蠙、周繇并称“九华四俊”。又与许棠、张蠙、周繇、郑谷等十人号为“咸通十哲”。乔有诗名，《唐才子传》卷十称其：“有高致，十年不窥园，以苦学，诗句清雅，迥少其伦。”贺裳谓“乔亦有一气贯串之妙，尤能作景语”（《载酒园诗话》又编）。存诗约一百七十首，《全唐诗》编为二卷。</p>
