<h2 class="kindle-cn-heading2">李频</h2>
<p class="kindle-cn-kai">李频（？—876），字德新，睦州清溪（今浙江淳安）人。少好学，曾千里访姚合学诗。大中八年（854）进士，授校书郎，历南陵主簿、武功令，以政声清正受绯衣、银鱼，历侍御史、都官员外郎、建州刺史，卒于任所。诗作工于雕琢，自称“只将五字句，用破一生心”（《北梦琐言》卷七）。《新唐书》有传。《全唐诗》收诗三卷，有《梨岳集》。</p>
