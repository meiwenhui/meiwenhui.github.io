<h2 class="kindle-cn-heading2">丘为</h2>
<p class="kindle-cn-kai">丘为（703？—798？），苏州嘉兴（今属浙江）人。累举不第，归山读书数年。天宝二年（743）进士及第。与王维、刘长卿相友善。历官主客郎中、司勋郎中、太子右庶子，以左散骑常侍致仕。事继母至孝，闻名于世。卒年九十六。现存诗十余首，多写田园风物，格调清幽淡逸。</p>
