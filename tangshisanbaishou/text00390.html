<h2 class="kindle-cn-heading2">柳中庸</h2>
<p class="kindle-cn-kai">柳中庸，生卒不详，名淡，蒲州虞乡（今山西永济）人。为柳宗元族人，萧颖士女婿。安史乱中，避居江南。大历中，与颜真卿、皎然等唱和，集为十卷《吴兴集》。后授洪州户曹参军，不就，卒。与陆羽、李端交厚。传附《新唐书•萧颖士传》。工诗，《全唐诗》录诗十三首。</p>
