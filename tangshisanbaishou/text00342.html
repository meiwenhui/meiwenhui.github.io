<h2 class="kindle-cn-heading2">张祜</h2>
<p class="kindle-cn-kai">张祜（792？—853？），字承吉，行三，郡望清河东武城（今山东武城西北），南阳（今属河南）人。晚年寓居丹阳（今属江苏）。早年曾浪迹江湖，狂放不羁。长庆、宝历中，曾两谒白居易。大（太）和中，又为令狐楚所举荐，遭权贵贬抑，一生遂以处士而终。张祜苦心作诗，宫词及五律中颇有名篇，当时即享盛名。有《张祜诗集》多种传世，以南宋蜀刻本《张承吉文集》收诗最多。</p>
