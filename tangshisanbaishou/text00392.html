<h2 class="kindle-cn-heading2">顾况</h2>
<p class="kindle-cn-kai">顾况（727？—816？），字逋翁，自号华阳山人，行十二，苏州海盐（今属浙江）人。至德二载（757）进士，曾任盐官、幕府判官，入朝为大理寺司直、秘书省著作佐郎，贬饶州司户参军。为人诙谐放任，好佛、老之学，曾隐茅山。顾况为中唐杰出诗人，长于歌行，注重诗的现实意义，其诗风对新乐府运动有启蒙作用。《全唐诗》编录其诗为四卷。现存《华阳集》三卷，又称《顾况集》。</p>
