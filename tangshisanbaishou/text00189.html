<h2 class="kindle-cn-heading2">刘眘虚</h2>
<p class="kindle-cn-kai">刘眘（古“慎”字）虚，生卒年不详，字全乙，行大，洪州新吴（今江西奉新）人。开元二十一年（733）进士，累官弘文馆校书郎。虽诗负盛名，但流落不偶。殷璠《河岳英灵集》录其诗十一首，并云：“眘虚诗，情幽兴远，思苦词奇，忽有所得，便惊众听。顷东南高唱者十数人，然声律婉态，无出其右。唯气骨不逮诸公。自永明已还，可杰立江表。……惜其不永，天碎国宝。”是眘虚卒于天宝十二载（753）前。其性高古，脱略势利，啸傲风尘，与孟浩然、高适、王昌龄等友善。乔亿谓其诗“空明深厚，饶有理趣”（《剑溪说诗》卷上），《全唐诗》编其诗为一卷，仅十五首，尚杂有他人之作。</p>
