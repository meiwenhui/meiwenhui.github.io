<h2 class="kindle-cn-heading2">祖咏</h2>
<p class="kindle-cn-kai">祖咏（699—746？），行三，洛阳（今属河南）人。开元十二年（724）进士。曾任小官而被贬。后移家归隐汝坟（今河南汝阳、临汝一带）间，以渔樵自终。祖咏早有诗名，与王维、王翰、卢象、丘为等人相友善，有诗唱酬。殷璠谓“咏诗剪刻省静，用思尤苦，气虽不高，调颇凌俗”（《河岳英灵集》）。曹毓德曰：“祖咏诸公，篇什不多，自是盛唐正轨。”（《唐七言律诗抄》）存诗三十余首，《全唐诗》编录一卷。</p>
