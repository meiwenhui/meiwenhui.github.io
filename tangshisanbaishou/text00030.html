<h2 class="kindle-cn-heading2">綦毋潜</h2>
<p class="kindle-cn-kai">綦（qí）毋潜（692？—755？），字孝通，排行三，虔州（今江西赣县）人。开元十四年（726）登进士第，授宜寿（今陕西周至）尉，入集贤院待制，复授校书郎。天宝初，弃官归江东，王维有《送綦毋潜弃官还江东》诗。后任右拾遗，终著作郎。与王维、李颀、储光羲、韦应物等人相友善。王维称其“盛得江左风，弥工建安体”（《别綦毋潜》）。李颀称其“夫子大名下，家无钟石储”（《送綦毋潜三谒房给事》）。可见时负诗名。他的诗清丽雅秀，“善写方外之情”（《河岳英灵集》）。《全唐诗》存诗一卷。</p>
