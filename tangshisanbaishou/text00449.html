<h2 class="kindle-cn-heading2">杜秋娘</h2>
<p class="kindle-cn-kai">杜秋娘，即杜秋。唐镇海节度使李锜妾，锜叛乱被杀，杜秋没籍入宫，得宪宗宠爱。穆宗时为太子保姆，太子废，即归金陵，穷老以终。善歌《金缕衣曲》。杜牧曾作《杜秋娘诗》。</p>
