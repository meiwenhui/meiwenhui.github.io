<h2 class="kindle-cn-heading2">崔涂</h2>
<p class="kindle-cn-kai">崔涂（850？—？），字礼山，桐庐（今属浙江）人。光启四年（888），登进士第。但一生未仕，长期漂泊，足迹遍及江湘、巴蜀、秦陇等地。涂“工诗，深造理窟，端能竦动人意，写景状怀，往往宣陶肺腑。……每多离怨之作”（《唐才子传》卷九）。《全唐诗》存其诗一卷。</p>
