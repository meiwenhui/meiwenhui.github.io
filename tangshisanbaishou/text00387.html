<h2 class="kindle-cn-heading2">刘方平</h2>
<p class="kindle-cn-kai">刘方平，生卒不详，排行八，河南（今河南洛阳）人。出身世家贵胄，而未登进士第，曾入幕。又怀才不遇，一生未仕，隐于颍水、汝水之滨。善画山水，用墨灵妙；工诗，诗风风雅超然。《全唐诗》收其诗为一卷。</p>
