<h2 class="kindle-cn-heading2">崔曙</h2>
<p class="kindle-cn-kai">崔曙（？—739），曙，又作“署”。原籍博陵（今河北安平），后迁居宋州（今河南商丘市南）。少孤贱，苦读书。曾往来于两京，隐居嵩山。开元二十六年（738），登进士第，以《明堂火珠》诗而得名。授河内（今河南沁阳）尉。次年卒。崔曙工诗，与薛据相友善。殷璠称其诗：“言词款要，情兴悲凉，送别、登楼，俱堪泪下。”（《河岳英灵集》）今存诗十五首，《全唐诗》编为一卷。</p>
