<h2 class="kindle-cn-heading2">裴迪</h2>
<p class="kindle-cn-kai">裴迪，生卒年不详，关中（今陕西）人，排行十。早年与王维、崔兴宗曾同隐终南山中。后来王维买得辋川别业，裴迪常与之浮舟往来，弹琴赋诗，坐以论道。王维将他和裴迪往来酬和唱咏之作各二十首集为《辋川集》，为山水诗作中重要的诗集。王维在安史之乱时陷贼被禁洛阳菩提寺，裴迪曾密往相见。后来裴迪入蜀，又与杜甫相识，杜甫尝作诗以赠。据李颀《圣吾阁送裴迪入京》诗，裴迪曾任职尚书省。裴迪为盛唐田园山水诗派重要诗人，长于五绝，风格与王维相近而不及。《全唐诗》仅存诗二十九首，尚有他人之作混入。</p>
