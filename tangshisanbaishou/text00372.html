<h2 class="kindle-cn-heading2">王翰</h2>
<p class="kindle-cn-kai">王翰，一作王澣，生卒不详，字子羽，并州晋阳（今山西太原）人。景云元年（710）进士。历昌乐县尉、秘书省正字、通事舍人、驾部、兵部员外郎、汝州长史、仙州别驾、道州司马。其间多以恃才傲物、纵欲狂欢遭贬。两《唐书》有传。善写边塞诗，为当时宰相张说所看重。《全唐诗》收诗一卷。</p>
